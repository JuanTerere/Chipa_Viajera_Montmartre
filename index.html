<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chipa Viajera: Anti-Fantasmas y Hincha</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0; background-color: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Arial', sans-serif; height: 100vh; overflow: hidden;
        }
        #game-container {
            position: relative; width: 100%; max-width: 420px; height: 100vh;
            background: #000; display: flex; flex-direction: column;
        }
        #ui-layer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; color: white; font-weight: bold; font-size: 13px;
            z-index: 10; background: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid #333; gap: 8px;
        }
        #hud-cocidos { white-space: nowrap; color: #f1c40f; }
        canvas { flex-grow: 1; width: 100%; background: #000; image-rendering: pixelated; }
        
        #level-banner {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 32px;
            font-weight: bold; text-shadow: 3px 3px 0px #ff0055, -3px -3px 0px #00ffcc;
            z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.5s ease;
            text-align: center; width: 100%; letter-spacing: 2px;
        }

        #loading-screen {
            position: absolute; inset: 0; background: #000; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Courier New', Courier, monospace; font-size: 18px;
            z-index: 40; letter-spacing: 2px;
        }
        #game-over-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 85%;
            background: rgba(15, 15, 25, 0.95); border: 3px solid #ff0055;
            border-radius: 12px; padding: 25px 15px; text-align: center;
            color: #fff; z-index: 30; box-shadow: 0px 0px 20px rgba(255, 0, 85, 0.4);
        }
        #go-title {
            font-family: 'Courier New', Courier, monospace; font-size: 28px;
            font-weight: bold; color: #ff0055; margin-bottom: 5px;
            text-shadow: 2px 2px 0px #000;
        }
        #go-stats { font-size: 16px; margin-bottom: 25px; color: #ccc; line-height: 1.5; }
        .score-highlight { color: #f1c40f; font-weight: bold; font-size: 20px; display: block; margin-top: 5px; }
        
        .go-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border: none; border-radius: 6px; font-weight: bold; font-size: 14px;
            cursor: pointer; text-decoration: none; text-align: center;
        }
        .btn-whatsapp { background-color: #25D366; color: #fff; }
        .btn-cert { background-color: #00ffcc; color: #000; }
        .btn-restart { background-color: #333; color: #fff; border: 1px solid #555; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="hud-stats-left">Nivel: 1/10 🗼 | Puntos: 0</div>
            <div id="hud-cocidos">☕ 0/10</div>
            <div id="hud-lives">❤️ x3</div>
        </div>
        <div id="level-banner">NIVEL 1</div>
        <div id="loading-screen">CARGANDO... 🥮</div>

        <div id="game-over-screen">
            <div id="go-title">FIN DEL VIAJE</div>
            <div id="go-stats">
                Llegaste al Nivel <span id="final-level">1</span>
                <span class="score-highlight" id="final-score">Puntos: 0</span>
            </div>
            <a id="btnShareWA" class="go-btn btn-whatsapp" href="#" target="_blank">📲 Compartir en WhatsApp</a>
            <button id="btnDownloadCert" class="go-btn btn-cert">🏆 Descargar Certificado</button>
            <button id="btnRestartGame" class="go-btn btn-restart">Intentar de Nuevo</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });

        let isPlaying = true; 
        let frameCount = 0;
        let lives = 3;
        let score = 0; 
        let cocidosCount = 0;
        
        let currentLevel = 1;
        let worldSpeed = 4; 
        let spawnRate = 75; 
        
        let serieActual = 1; 
        let idxActual = 0;   
        let idxSiguiente = 1;

        let scrollY = 0; 
        let lanePositions = []; 

        const SPRITE_SIZE = 105; 

        // --- CARGA DE ASSETS (RUTAS CORREGIDAS APUNTANDO A LA CARPETA 'imágenes/') ---
        const escaleras = [new Image(), new Image(), new Image(), new Image(), new Image(), new Image()];
        escaleras[0].src = 'imágenes/Escalera París.png';
        escaleras[1].src = 'imágenes/Escalera París1.png';
        escaleras[2].src = 'imágenes/Escalera París2.png';
        escaleras[3].src = 'imágenes/Escalera París3.png';
        escaleras[4].src = 'imágenes/Escalera París4.png';
        escaleras[5].src = 'imágenes/Escalera París5.png';

        const imgRunD1 = new Image(); imgRunD1.src = 'imágenes/chipa_run_derecha1.png';
        const imgRunD2 = new Image(); imgRunD2.src = 'imágenes/chipa_run_derecha2.png';
        const imgJumpD = new Image(); imgJumpD.src = 'imágenes/chipa_jump_derecha.png';
        const imgRunI1 = new Image(); imgRunI1.src = 'imágenes/chipa_run_izquierda1.png';
        const imgRunI2 = new Image(); imgRunI2.src = 'imágenes/chipa_run_izquierda2.png';
        const imgJumpI = new Image(); imgJumpI.src = 'imágenes/chipa_jump_izquierda.png'; 
        const imgCrash = new Image(); imgCrash.src = 'imágenes/chipa_crash.png'; 

        const maletaAzulA = new Image(); maletaAzulA.src = 'imágenes/Maleta azulA.png';
        const maletaAzulB = new Image(); maletaAzulB.src = 'imágenes/Maleta azulB.png';
        const maletaRojaA = new Image(); maletaRojaA.src = 'imágenes/Maleta rojaA.png';
        const maletaRojaB = new Image(); maletaRojaB.src = 'imágenes/Maleta rojaB.png';
        const maletaLilaA = new Image(); maletaLilaA.src = 'imágenes/Maleta lilaA.png';
        const maletaLilaB = new Image(); maletaLilaB.src = 'imágenes/Maleta lilaB.png';

        const ancianoBaja1 = new Image(); ancianoBaja1.src = 'imágenes/Ancianos bajando1.png';
        const ancianoBaja2 = new Image(); ancianoBaja2.src = 'imágenes/Ancianos bajando2.png';

        const turistaPesada1 = new Image(); turistaPesada1.src = 'imágenes/Turista_pesada1.png';
        const turistaPesada2 = new Image(); turistaPesada2.src = 'imágenes/Turista_pesada2.png';

        const señoraBajaA = new Image(); señoraBajaA.src = 'imágenes/Señora_bajandoA.png';
        const señoraBajaB = new Image(); señoraBajaB.src = 'imágenes/Señora_bajandoB.png';
        const imgParadaFoto = new Image(); imgParadaFoto.src = 'imágenes/Parada_foto.png';
        
        const imgTuristaSentado = new Image(); imgTuristaSentado.src = 'imágenes/Turista sentado.png';
        
        const imgHinchaParaguay = new Image(); imgHinchaParaguay.src = 'imágenes/hincha de Paraguay.png';

        const ancianaBolsasA = new Image(); ancianaBolsasA.src = 'imágenes/Anciana_bolsasA.png';
        const ancianaBolsasB = new Image(); ancianaBolsasB.src = 'imágenes/Anciana_bolsasB.png';
        const empresarioA = new Image(); empresarioA.src = 'imágenes/EmpresarioA.png';
        const empresarioB = new Image(); empresarioB.src = 'imágenes/EmpresarioB.png';

        const turistaSubeA = new Image(); turistaSubeA.src = 'imágenes/Subiendo TuristaA.png';
        const turistaSubeB = new Image(); turistaSubeB.src = 'imágenes/Subiendo TuristaB.png';

        const turistaSubeSoloA = new Image(); turistaSubeSoloA.src = 'imágenes/Turista sube soloA.png'; 
        const turistaSubeSoloB = new Image(); turistaSubeSoloB.src = 'imágenes/Turista sube soloB.png';

        const tazaA = new Image(); tazaA.src = 'imágenes/TazaA.png';
        const tazaB = new Image(); tazaB.src = 'imágenes/TazaB.png';

        const corredoresCarga = [
            { c1: new Image(), c2: new Image() }, 
            { c1: new Image(), c2: new Image() }, 
            { c1: new Image(), c2: new Image() }  
        ];
        corredoresCarga[0].c1.src = 'imágenes/Corredor_sube_Corre1.png'; corredoresCarga[0].c2.src = 'imágenes/Corredor_sube_Corre2.png';
        corredoresCarga[1].c1.src = 'imágenes/Corredora_sube_Rojo1.png'; corredoresCarga[1].c2.src = 'imágenes/Corredora_sube_Rojo2.png';
        corredoresCarga[2].c1.src = 'imágenes/Corredora_sube_Corre1.png'; corredoresCarga[2].c2.src = 'imágenes/Corredora_sube_Corre2.png';

        const imgJePasse = new Image(); imgJePasse.src = 'imágenes/Je_passe.png';

        const player = {
            lane: 1, x: 0, y: 0,
            isJumpingHandrail: false, jumpProgress: 0,
            sourceLane: 1, targetLane: 3,
            stepToggle: 0, facing: 'derecha',
            isCrashing: false, crashTimer: 0
        };

        const obstacles = [];
        const alerts = []; 

        let obstacleAnimToggle = 0;

        const hudStatsLeftEl = document.getElementById("hud-stats-left");
        const hudCocidosEl = document.getElementById("hud-cocidos");
        const hudLivesEl = document.getElementById("hud-lives");
        let hudStatsLeftCache = "";
        let hudCocidosCache = "";
        let hudLivesCache = "";

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            player.y = canvas.height - 130; 
            
            let w = canvas.width;
            lanePositions = [w * 0.22, w * 0.38, w * 0.50, w * 0.62, w * 0.78];
            player.x = lanePositions[player.lane];
        }
        
        window.addEventListener('load', () => { 
            resizeCanvas(); 
            precargarAssets().then(() => {
                const loadingScreen = document.getElementById("loading-screen");
                if (loadingScreen) loadingScreen.style.display = "none";
                showLevelBanner();
                loop();
            });
        });
        window.addEventListener('resize', resizeCanvas);

        function precargarAssets() {
            const todasLasImagenes = [
                ...escaleras,
                imgRunD1, imgRunD2, imgJumpD, imgRunI1, imgRunI2, imgJumpI, imgCrash,
                maletaAzulA, maletaAzulB, maletaRojaA, maletaRojaB, maletaLilaA, maletaLilaB,
                ancianoBaja1, ancianoBaja2, turistaPesada1, turistaPesada2,
                señoraBajaA, señoraBajaB, imgParadaFoto, imgTuristaSentado,
                imgHinchaParaguay, ancianaBolsasA, ancianaBolsasB, empresarioA, empresarioB,
                turistaSubeA, turistaSubeB, turistaSubeSoloA, turistaSubeSoloB,
                tazaA, tazaB, imgJePasse,
                ...corredoresCarga.flatMap(c => [c.c1, c.c2])
            ];

            const promesas = todasLasImagenes.map(img => new Promise(resolve => {
                const terminar = () => {
                    if (img.decode) img.decode().then(resolve).catch(resolve);
                    else resolve();
                };
                if (img.complete && img.naturalWidth > 0) terminar();
                else {
                    img.addEventListener('load', terminar, { once: true });
                    img.addEventListener('error', resolve, { once: true }); // Si falla, no traba el juego
                }
            }));

            const timeoutSeguridad = new Promise(resolve => setTimeout(resolve, 3000));
            return Promise.race([Promise.all(promesas), timeoutSeguridad]);
        }

        function showLevelBanner() {
            const banner = document.getElementById("level-banner");
            banner.innerText = `NIVEL ${currentLevel}`;
            banner.style.opacity = "1";
            setTimeout(() => { banner.style.opacity = "0"; }, 1800);
        }

        function showGameOverScreen(won = false) {
            isPlaying = false;
            const screen = document.getElementById("game-over-screen");
            const title = document.getElementById("go-title");
            const btnWA = document.getElementById("btnShareWA");

            document.getElementById("final-level").innerText = currentLevel;
            document.getElementById("final-score").innerText = `Puntos: ${score}`;

            if (won) {
                title.innerText = "¡VICTORIA TOTAL! 🏆"; title.style.color = "#00ffcc";
            } else {
                title.innerText = "FIN DEL VIAJE 🗼"; title.style.color = "#ff0055";
            }

            const textShare = encodeURIComponent(`¡Conseguí ${score} puntos y llegué al Nivel ${currentLevel} esquivando turistas y tomando cocido en Montmartre con la Chipa Viajera! 🥮☕ ¿Podés superarme?`);
            btnWA.href = `https://api.whatsapp.com/send?text=${textShare}`;

            screen.style.display = "block";
        }

        document.getElementById("btnRestartGame").addEventListener("click", () => window.location.reload());
        document.getElementById("btnDownloadCert").addEventListener("click", () => alert(`Certificado listo para configurar. Nivel: ${currentLevel} | Puntos: ${score}`));

        function handleInput(direction) {
            if (!isPlaying || player.isJumpingHandrail || player.isCrashing) return;

            if (direction === 'left') {
                player.facing = 'izquierda';
                if (player.lane === 3) {
                    player.isJumpingHandrail = true;
                    player.sourceLane = 3; player.targetLane = 1; player.jumpProgress = 0;
                } else if (player.lane === 1) player.lane = 0;
                  else if (player.lane === 4) player.lane = 3;
            } else if (direction === 'right') {
                player.facing = 'derecha';
                if (player.lane === 1) {
                    player.isJumpingHandrail = true;
                    player.sourceLane = 1; player.targetLane = 3; player.jumpProgress = 0;
                } else if (player.lane === 0) player.lane = 1;
                  else if (player.lane === 3) player.lane = 4;
            }
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") handleInput('left');
            if (e.key === "ArrowRight") handleInput('right');
        });

        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            const midPoint = canvas.width / 2;
            if (touchX < midPoint) handleInput('left');
            else handleInput('right');
        }, { passive: false });

        function triggerCrash() {
            player.isCrashing = true;
            player.crashTimer = 60; 
            lives--;
        }

        function checkLevelProgression() {
            if (currentLevel >= 10) { showGameOverScreen(true); return; }
            currentLevel++; worldSpeed += 0.8; 
            spawnRate = Math.max(35, spawnRate - 6);
            serieActual = 1; score += 500; 
            showLevelBanner();
        }

        function spawnObstacles() {
            if (player.isCrashing) return;
            if (frameCount % spawnRate === 0) {
                const validLanes = [0, 1, 3, 4];
                const selectedLane = validLanes[Math.floor(Math.random() * validLanes.length)];
                const rand = Math.random();

                if (rand < 0.08) { 
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'cocido', width: SPRITE_SIZE * 0.65, height: SPRITE_SIZE * 0.65, speed: worldSpeed });
                } else if (rand < 0.20) {
                    const rMaleta = Math.random();
                    let color = 'azul';
                    if (rMaleta > 0.66) color = 'roja';
                    else if (rMaleta > 0.33) color = 'lila';
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'maleta', variant: color, width: SPRITE_SIZE * 0.75, height: SPRITE_SIZE * 0.75, speed: worldSpeed * 1.1 });
                } else if (rand < 0.29) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'anciano', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.12 });
                } else if (rand < 0.38) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_pesada', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.4 });
                } else if (rand < 0.47) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'señora', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.1 });
                } else if (rand < 0.56) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'anciana_bolsas', width: SPRITE_SIZE * 0.85, height: SPRITE_SIZE * 0.85, speed: worldSpeed * 0.35 });
                } else if (rand < 0.64) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'empresario', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.15 });
                } else if (rand < 0.70) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'parada_foto', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed });
                } else if (rand < 0.76) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sentado', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed });
                } else if (rand < 0.82) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'hincha_paraguay', width: SPRITE_SIZE * 0.8, height: SPRITE_SIZE * 0.8, speed: worldSpeed });
                } else if (rand < 0.88) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sube', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.65 });
                } else if (rand < 0.94) {
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sube_solo', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.85 });
                } else {
                    const laneHasAlert = alerts.some(a => a.lane === selectedLane);
                    if (!laneHasAlert) alerts.push({ lane: selectedLane, x: lanePositions[selectedLane], y: canvas.height - 80, duration: 85 });
                }
            }
        }

        function aplicarIAEsquive() {
            for (let i = 0; i < obstacles.length; i++) {
                let obsA = obstacles[i];
                if (obsA.type === 'parada_foto' || obsA.type === 'turista_sentado' || obsA.type === 'cocido' || obsA.type === 'hincha_paraguay') continue; 

                for (let j = 0; j < obstacles.length; j++) {
                    if (i === j) continue;
                    let obsB = obstacles[j];

                    if (obsA.lane === obsB.lane && Math.abs(obsA.y - obsB.y) < 115) {
                        let desvíosPosibles = [];
                        if (obsA.lane === 0) desvíosPosibles = [1];
                        if (obsA.lane === 1) desvíosPosibles = [0];    
                        if (obsA.lane === 3) desvíosPosibles = [4];    
                        if (obsA.lane === 4) desvíosPosibles = [3];

                        let mejorCarril = obsA.lane;
                        for (let lan of desvíosPosibles) {
                            let carrilOcupado = obstacles.some(o => o.lane === lan && Math.abs(o.y - obsA.y) < 120);
                            if (!carrilOcupado) { mejorCarril = lan; break; }
                        }

                        if (mejorCarril !== obsA.lane) {
                            obsA.lane = mejorCarril;
                            obsA.targetX = lanePositions[mejorCarril];
                        }
                    }
                }
            }
        }

        function drawImageSafely(img, x, y, baseWidth) {
            if (img && img.complete && img.naturalWidth > 0) {
                let aspect = img.naturalWidth / img.naturalHeight;
                let renderHeight = baseWidth / aspect; 
                ctx.drawImage(img, x - (baseWidth / 2), y - (renderHeight / 2), baseWidth, renderHeight);
            } else {
                ctx.fillStyle = "rgba(230, 126, 34, 0.7)";
                ctx.fillRect(x - 20, y - 20, 40, 40);
            }
        }

        function loop() {
            if (!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            if (frameCount % 8 === 0) player.stepToggle = player.stepToggle === 0 ? 1 : 0;
            if (frameCount % 14 === 0) obstacleAnimToggle = obstacleAnimToggle === 0 ? 1 : 0;

            if (frameCount % 30 === 0 && !player.isCrashing) score += 5;

            if (player.isCrashing) {
                player.crashTimer--;
                if (player.crashTimer <= 0) {
                    player.isCrashing = false;
                    if (lives <= 0) { showGameOverScreen(false); return; }
                }
            }

            if (!player.isCrashing) scrollY += worldSpeed;

            if (scrollY >= canvas.height) {
                scrollY = 0;
                idxActual = idxSiguiente;
                idxSiguiente = (idxSiguiente + 1) % escaleras.length;
                if (idxSiguiente === 0) {
                    if (serieActual === 1) serieActual = 2;
                    else checkLevelProgression();
                }
            }

            if (escaleras[idxActual] && escaleras[idxActual].complete) ctx.drawImage(escaleras[idxActual], 0, scrollY, canvas.width, canvas.height);
            if (escaleras[idxSiguiente] && escaleras[idxSiguiente].complete) ctx.drawImage(escaleras[idxSiguiente], 0, scrollY - canvas.height, canvas.width, canvas.height);

            const statsLeftTexto = `Nivel: ${currentLevel}/10 🗼 | Puntos: ${score}`;
            if (statsLeftTexto !== hudStatsLeftCache) {
                hudStatsLeftCache = statsLeftTexto;
                hudStatsLeftEl.innerText = statsLeftTexto;
            }
            const cocidosTexto = `☕ ${cocidosCount}/10`;
            if (cocidosTexto !== hudCocidosCache) {
                hudCocidosCache = cocidosTexto;
                hudCocidosEl.innerText = cocidosTexto;
            }
            const livesTexto = `❤️ x${lives}`;
            if (livesTexto !== hudLivesCache) {
                hudLivesCache = livesTexto;
                hudLivesEl.innerText = livesTexto;
            }

            for (let i = alerts.length - 1; i >= 0; i--) {
                let al = alerts[i];
                if (!player.isCrashing) al.duration--;

                if (imgJePasse && imgJePasse.complete) ctx.drawImage(imgJePasse, lanePositions[al.lane] - 36, al.y, 72, 48);

                if (al.duration <= 0) {
                    obstacles.push({
                        lane: al.lane, x: lanePositions[al.lane], targetX: lanePositions[al.lane],
                        y: canvas.height + 60, type: 'corredor', variant: Math.floor(Math.random() * 3), 
                        width: SPRITE_SIZE, height: SPRITE_SIZE, speed: -worldSpeed * 1.25 
                    });
                    alerts.splice(i, 1);
                }
            }

            spawnObstacles();
            aplicarIAEsquive();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                if (!player.isCrashing) obs.y += obs.speed;
                obs.x += (obs.targetX - obs.x) * 0.1; 

                let spriteRender = null;
                if (obs.type === 'cocido') spriteRender = obstacleAnimToggle === 0 ? tazaA : tazaB;
                else if (obs.type === 'maleta') {
                    if (obs.variant === 'azul') spriteRender = obstacleAnimToggle === 0 ? maletaAzulA : maletaAzulB;
                    else if (obs.variant === 'roja') spriteRender = obstacleAnimToggle === 0 ? maletaRojaA : maletaRojaB;
                    else spriteRender = obstacleAnimToggle === 0 ? maletaLilaA : maletaLilaB;
                } 
                else if (obs.type === 'anciano') spriteRender = obstacleAnimToggle === 0 ? ancianoBaja1 : ancianoBaja2;
                else if (obs.type === 'turista_pesada') spriteRender = obstacleAnimToggle === 0 ? turistaPesada1 : turistaPesada2;
                else if (obs.type === 'señora') spriteRender = obstacleAnimToggle === 0 ? señoraBajaA : señoraBajaB;
                else if (obs.type === 'anciana_bolsas') spriteRender = obstacleAnimToggle === 0 ? ancianaBolsasA : ancianaBolsasB;
                else if (obs.type === 'empresario') spriteRender = obstacleAnimToggle === 0 ? empresarioA : empresarioB;
                else if (obs.type === 'parada_foto') spriteRender = imgParadaFoto;
                else if (obs.type === 'turista_sentado') spriteRender = imgTuristaSentado;
                else if (obs.type === 'hincha_paraguay') spriteRender = imgHinchaParaguay; 
                else if (obs.type === 'turista_sube') spriteRender = obstacleAnimToggle === 0 ? turistaSubeA : turistaSubeB;
                else if (obs.type === 'turista_sube_solo') spriteRender = obstacleAnimToggle === 0 ? turistaSubeSoloA : turistaSubeSoloB;
                else if (obs.type === 'corredor') {
                    let set = corredoresCarga[obs.variant];
                    spriteRender = obstacleAnimToggle === 0 ? set.c1 : set.c2;
                }

                drawImageSafely(spriteRender, obs.x, obs.y, obs.width);

                if (!obs.hasCrashed && !player.isJumpingHandrail && !player.isCrashing && obs.lane === player.lane) {
                    if (Math.abs(obs.y - player.y) < 42) {
                        if (obs.type === 'cocido') {
                            score += 100;
                            cocidosCount++;
                            if (cocidosCount >= 10) {
                                cocidosCount = 0;
                                lives++;
                            }
                            obstacles.splice(i, 1);
                            continue;
                        } else {
                            triggerCrash();
                            obs.hasCrashed = true; 
                            continue;
                        }
                    }
                }

                if (obs.y > canvas.height + 80 || obs.y < -80) {
                    obstacles.splice(i, 1);
                }
            }

            let targetX = lanePositions[player.lane];

            if (player.isCrashing) {
                drawImageSafely(imgCrash, player.x, player.y, 50);
            } else if (player.isJumpingHandrail) {
                player.jumpProgress += 0.08;
                let startX = lanePositions[player.sourceLane];
                let endX = lanePositions[player.targetLane];
                
                player.x = startX + (endX - startX) * player.jumpProgress;
                let jumpHeight = Math.sin(player.jumpProgress * Math.PI) * 65;

                let activeJumpImg = player.facing === 'derecha' ? imgJumpD : imgJumpI;
                drawImageSafely(activeJumpImg, player.x, player.y - jumpHeight, 55);

                if (player.jumpProgress >= 1) {
                    player.lane = player.targetLane;
                    player.x = lanePositions[player.lane];
                    player.isJumpingHandrail = false;
                }
            } else {
                player.x += (targetX - player.x) * 0.3;
                let activeImg = player.facing === 'derecha' 
                    ? (player.stepToggle === 0 ? imgRunD1 : imgRunD2)
                    : (player.stepToggle === 0 ? imgRunI1 : imgRunI2);
                
                drawImageSafely(activeImg, player.x, player.y, 50);
            }

            requestAnimationFrame(loop);
        }
    </script>
