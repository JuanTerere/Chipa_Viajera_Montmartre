    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0; background-color: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Arial', sans-serif; height: 100vh; overflow: hidden;
        }
        #game-container {
            position: relative; width: 100%; max-width: 420px; height: 100vh;
            background: #000; display: flex; flex-direction: column;
        }
        #ui-layer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; color: white; font-weight: bold; font-size: 13px;

        }
        #hud-cocidos { white-space: nowrap; color: #f1c40f; }
        #hud-players { white-space: nowrap; color: #5dade2; }
        canvas { flex-grow: 1; width: 100%; background: #000; image-rendering: pixelated; }

        #level-banner {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 32px;
            font-weight: bold; text-shadow: 3px 3px 0px #ff0055, -3px -3px 0px #00ffcc;

        #loading-screen {

            display: flex; align-items: center; justify-content: center;
            font-family: 'Courier New', Courier, monospace; font-size: 18px;
            z-index: 40; letter-spacing: 2px;
        }

        /* Modales de Interfaz */
        .modal-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 88%; max-height: 85%;
            background: rgba(15, 15, 25, 0.98); border: 3px solid #ff0055;
            border-radius: 12px; padding: 22px 15px; text-align: center;
            color: #fff; z-index: 30; box-shadow: 0px 0px 25px rgba(255, 0, 85, 0.5);
            flex-direction: column; overflow-y: auto;
        }
        .go-title {
            font-family: 'Courier New', Courier, monospace; font-size: 22px;
            font-weight: bold; color: #ff0055; margin-bottom: 12px; line-height: 1.3;
        }
        .score-highlight { color: #f1c40f; font-weight: bold; font-size: 22px; display: block; margin: 8px 0; }

        .go-input, .go-select {
            padding: 10px; width: 100%; margin-bottom: 12px; border-radius: 6px;
            border: 1px solid #555; background: #222; color: #fff; text-align: center; font-size: 15px;
        }
        .go-btn {
            display: block; width: 100%; padding: 11px; margin: 6px 0;
            border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer;
        }

        .btn-whatsapp { background-color: #25D366; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-cert { background-color: #00ffcc; color: #000; }
        .btn-rank { background-color: #2980b9; color: #fff; }
        .btn-restart { background-color: #444; color: #fff; margin-top: 10px; }

        /* Estilos de la tabla de Ranking */
        #rankingList { list-style: none; padding: 0; margin: 15px 0; text-align: left; }
        #rankingList li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; border-bottom: 1px solid #333; font-size: 14px;
        }
        #rankingList li:nth-child(1) { color: #f1c40f; font-weight: bold; font-size: 16px; }
        .rank-item-left { display: flex; gap: 8px; align-items: center; }
        .rank-pos { width: 24px; font-weight: bold; }
        #cert-numero { color: #888; font-size: 12px; display: block; margin-top: -4px; margin-bottom: 10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getFirestore, doc, getDoc, setDoc, updateDoc, increment, runTransaction,
            onSnapshot, collection, addDoc, query, orderBy, limit, getDocs
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // IMPORTANTE: revisa estos valores en Firebase > Configuración del proyecto.
        // El messagingSenderId y appId no coincidían entre tus dos versiones del archivo;
        // dejé los de 12 dígitos (formato estándar), pero conviene que los confirmes.
        const firebaseConfig = {
            apiKey: "AIzaSyARwzSFBfViQEo2mcVRvieMy2nuUiDYXqs",
            authDomain: "chipa-viajera.firebaseapp.com",
            projectId: "chipa-viajera",
            storageBucket: "chipa-viajera.firebasestorage.app",
            messagingSenderId: "533357296369",
            appId: "1:533357296369:web:97f7f9ad1c5b7664658750"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const refEstadisticas = doc(db, "metadatos", "estadisticas");

        async function registrarJugador() {
            try {
                await updateDoc(refEstadisticas, { totalJugadores: increment(1) });
            } catch (e) {
                try {
                    await setDoc(refEstadisticas, { totalJugadores: 1 }, { merge: true });
                } catch (e2) {
                    console.error("No se pudo registrar el jugador:", e2);
                }
            }
        }
        registrarJugador();

        onSnapshot(refEstadisticas, (snap) => {
            const el = document.getElementById("playerCount");
            if (el && snap.exists()) el.innerText = snap.data().totalJugadores ?? "-";
        }, (error) => {
            console.error("Error escuchando el contador mundial:", error);
        });

        // Numeración atómica de certificados: cada descarga obtiene un número único y secuencial.
        window.obtenerNumeroCertificado = async function () {
            const refCert = doc(db, "metadatos", "certificados");
            try {
                const numero = await runTransaction(db, async (tx) => {
                    const snap = await tx.get(refCert);
                    const actual = snap.exists() ? (snap.data().total || 0) : 0;
                    const siguiente = actual + 1;
                    tx.set(refCert, { total: siguiente }, { merge: true });
                    return siguiente;
                });
                return numero;
            } catch (e) {
                console.error("No se pudo numerar el certificado en linea:", e);
                return null;
            }
        };

        window.guardarEnRanking = async function (nombre, puntos, bandera) {
            await addDoc(collection(db, "ranking"), {
                nombre, puntos, bandera, fecha: new Date().toISOString()
            });
        };

        window.obtenerTop10 = async function () {
            const q = query(collection(db, "ranking"), orderBy("puntos", "desc"), limit(10));
            const snap = await getDocs(q);
            const resultados = [];
            snap.forEach((d) => resultados.push(d.data()));
            return resultados;
        };
    </script>
</head>

        const hudCocidosEl = document.getElementById("hud-cocidos");
        const hudLivesEl = document.getElementById("hud-lives");

        function resizeCanvas() {
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
            player.y = canvas.height - 130;
            let w = canvas.width;
            lanePositions = [w * 0.22, w * 0.38, w * 0.50, w * 0.62, w * 0.78];
            player.x = lanePositions[player.lane];
        }

        window.addEventListener('load', () => {
            resizeCanvas();
            precargarAssets().then(() => {
                const pantallaCarga = document.getElementById("loading-screen");
                if (pantallaCarga) pantallaCarga.style.display = "none";
                showLevelBanner();
                loop();
            });
        });
        window.addEventListener('resize', resizeCanvas);

        function precargarAssets() {
            const todasLasImagenes = [
                ...escaleras, imgRunD1, imgRunD2, imgJumpD, imgRunI1, imgRunI2, imgJumpI, imgCrash,
                maletaAzulA, maletaAzulB, maletaRojaA, maletaRojaB, maletaLilaA, maletaLilaB,
                ancianoBaja1, ancianoBaja2, turistaPesada1, turistaPesada2, señoraBajaA, señoraBajaB,
                imgParadaFoto, imgTuristaSentado, imgHinchaParaguay, ancianaBolsasA, ancianaBolsasB,
                empresarioA, empresarioB, turistaSubeA, turistaSubeB, turistaSubeSoloA, turistaSubeSoloB,
                tazaA, tazaB, imgJePasse, ...corredoresCarga.flatMap(c => [c.c1, c.c2])
            ];
            const promesas = todasLasImagenes.map(img => new Promise(resolve => {
                const terminar = () => { if (img.decode) img.decode().then(resolve).catch(resolve); else resolve(); };
                if (img.complete && img.naturalWidth > 0) terminar();
                else { img.addEventListener('load', terminar, { once: true }); img.addEventListener('error', resolve, { once: true }); }
            }));
            return Promise.race([Promise.all(promesas), new Promise(r => setTimeout(r, 4000))]);
        }

            lista.innerHTML = "<li style='justify-content:center;color:#888;'>Cargando TOP 10...</li>";

                const resultados = await window.obtenerTop10();
                lista.innerHTML = "";

                for (const data of resultados) {
                    const medalla = i === 1 ? "🥇 " : i === 2 ? "🥈 " : i === 3 ? "🥉 " : `${i}. `;

            function dibujarCertificadoBase(cx, width, height) {
                const gradiente = cx.createLinearGradient(0, 0, width, height);
                gradiente.addColorStop(0, '#1a1a2e'); gradiente.addColorStop(1, '#16213e');
                cx.fillStyle = gradiente; cx.fillRect(0, 0, width, height);
                cx.strokeStyle = '#f1c40f'; cx.lineWidth = 20; cx.strokeRect(10, 10, width - 20, height - 20);

                    c.width = certImg.naturalWidth || 1200;
                    c.height = certImg.naturalHeight || 800;
                    const cx = c.getContext("2d");

                    if (certImg.complete && certImg.naturalWidth > 0) {

                        cx.fillText(nombreCert.toUpperCase(), c.width * 0.5, c.height * 0.58);
                        cx.fillStyle = "#d35400"; cx.font = `bold ${c.width * 0.055}px sans-serif`;
                        cx.fillText(`${puntosCert} PUNTOS`, c.width * 0.5, c.height * 0.68);
                        cx.fillStyle = "#555555"; cx.font = `${c.width * 0.022}px sans-serif`;
                        cx.fillText(`N.° ${numeroFormateado}`, c.width * 0.5, c.height * 0.78);
                    } else {
                        dibujarCertificadoBase(cx, c.width, c.height);
                        cx.fillStyle = "#f1c40f"; cx.font = `bold ${c.width * 0.05}px sans-serif`; cx.textAlign = "center";
                        cx.fillText(nombreCert.toUpperCase(), c.width * 0.5, c.height * 0.58);
                        cx.fillStyle = "#ffffff"; cx.font = `bold ${c.width * 0.045}px sans-serif`;
                        cx.fillText(`${puntosCert} PUNTOS EN MONTMARTRE`, c.width * 0.5, c.height * 0.70);
                        cx.fillStyle = "#999999"; cx.font = `${c.width * 0.022}px sans-serif`;
                        cx.fillText(`N.° ${numeroFormateado}`, c.width * 0.5, c.height * 0.80);
                    }

                    const link = document.createElement("a");
                    link.href = c.toDataURL("image/jpeg", 0.95);
                    link.download = `Certificado_Montmartre_${numeroFormateado}_${nombreCert.replace(/\s+/g, '_')}.jpg`;
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                } catch (e) {
                    console.error("Error al generar el certificado:", e);
                } finally {
                    btn.disabled = false;
                    btn.innerText = textoOriginal;
                }
            }

            certImg.onload = finalizarDescarga;
            certImg.onerror = finalizarDescarga;
        });

        function handleInput(direction) {
            if (!isPlaying || player.isJumpingHandrail || player.isCrashing) return;
            if (direction === 'left') {
                player.facing = 'izquierda';
                if (player.lane === 3) { player.isJumpingHandrail = true; player.sourceLane = 3; player.targetLane = 1; player.jumpProgress = 0; }
                else if (player.lane === 1) player.lane = 0; else if (player.lane === 4) player.lane = 3;
            } else if (direction === 'right') {
                player.facing = 'derecha';
                if (player.lane === 1) { player.isJumpingHandrail = true; player.sourceLane = 1; player.targetLane = 3; player.jumpProgress = 0; }
                else if (player.lane === 0) player.lane = 1; else if (player.lane === 3) player.lane = 4;
            }
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") handleInput('left');
            if (e.key === "ArrowRight") handleInput('right');
        });
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            if (touchX < canvas.width / 2) handleInput('left'); else handleInput('right');
        }, { passive: false });

        function triggerCrash() { player.isCrashing = true; player.crashTimer = 60; lives--; }

        function checkLevelProgression() {
            currentLevel++;
            if (currentLevel > 10) {
                worldSpeed *= 1.15;
                spawnRate = Math.max(20, Math.floor(spawnRate * 0.75));
            } else {
                worldSpeed += 0.8;
                spawnRate = Math.max(35, spawnRate - 6);
            }
            serieActual = 1; score += 500; showLevelBanner();
        }

        function spawnObstacles() {
            if (player.isCrashing) return;
            if (frameCount % spawnRate === 0) {
                const validLanes = [0, 1, 3, 4];
                const selectedLane = validLanes[Math.floor(Math.random() * validLanes.length)];
                const rand = Math.random();

                if (rand < 0.08) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'cocido', width: SPRITE_SIZE * 0.65, height: SPRITE_SIZE * 0.65, speed: worldSpeed }); }
                else if (rand < 0.20) {
                    let color = Math.random() > 0.66 ? 'roja' : Math.random() > 0.33 ? 'lila' : 'azul';
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'maleta', variant: color, width: SPRITE_SIZE * 0.75, height: SPRITE_SIZE * 0.75, speed: worldSpeed * 1.1 });
                }
                else if (rand < 0.29) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'anciano', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.12 }); }
                else if (rand < 0.38) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_pesada', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.4 }); }
                else if (rand < 0.47) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'señora', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.1 }); }
                else if (rand < 0.56) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'anciana_bolsas', width: SPRITE_SIZE * 0.85, height: SPRITE_SIZE * 0.85, speed: worldSpeed * 0.35 }); }
                else if (rand < 0.64) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'empresario', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.15 }); }
                else if (rand < 0.70) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'parada_foto', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed }); }
                else if (rand < 0.76) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sentado', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed }); }
                else if (rand < 0.82) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'hincha_paraguay', width: SPRITE_SIZE * 0.8, height: SPRITE_SIZE * 0.8, speed: worldSpeed }); }
                else if (rand < 0.88) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sube', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.65 }); }
                else if (rand < 0.94) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sube_solo', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.85 }); }
                else { if (!alerts.some(a => a.lane === selectedLane)) alerts.push({ lane: selectedLane, x: lanePositions[selectedLane], y: canvas.height - 80, duration: 85 }); }
            }
        }

        function aplicarIAEsquive() {
            for (let i = 0; i < obstacles.length; i++) {
                let obsA = obstacles[i];
                if (obsA.type === 'parada_foto' || obsA.type === 'turista_sentado' || obsA.type === 'cocido' || obsA.type === 'hincha_paraguay') continue;
                for (let j = 0; j < obstacles.length; j++) {
                    if (i === j) continue;
                    let obsB = obstacles[j];
                    if (obsA.lane === obsB.lane && Math.abs(obsA.y - obsB.y) < 115) {
                        let desvíos = obsA.lane === 0 ? [1] : obsA.lane === 1 ? [0] : obsA.lane === 3 ? [4] : [3];
                        let mejorCarril = obsA.lane;
                        for (let lan of desvíos) {
                            if (!obstacles.some(o => o.lane === lan && Math.abs(o.y - obsA.y) < 120)) { mejorCarril = lan; break; }
                        }
                        if (mejorCarril !== obsA.lane) { obsA.lane = mejorCarril; obsA.targetX = lanePositions[mejorCarril]; }
                    }
                }
            }
        }

        function drawImageSafely(img, x, y, baseWidth) {
            if (img && img.complete && img.naturalWidth > 0) {
                let aspect = img.naturalWidth / img.naturalHeight;
                let targetWidth = baseWidth;
                let targetHeight = baseWidth / aspect;

                const MAX_HEIGHT = 100;
                if (targetHeight > MAX_HEIGHT) {
                    targetHeight = MAX_HEIGHT;
                    targetWidth = targetHeight * aspect;
                }

                ctx.drawImage(img, x - (targetWidth / 2), y - (targetHeight / 2), targetWidth, targetHeight);
            } else {
                ctx.fillStyle = "rgba(255, 0, 128, 0.4)";
                ctx.fillRect(x - (baseWidth / 2), y - (baseWidth / 2), baseWidth, baseWidth);
            }
        }

        function loop() {
            if (!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            if (frameCount % 8 === 0) player.stepToggle = player.stepToggle === 0 ? 1 : 0;
            if (frameCount % 14 === 0) obstacleAnimToggle = obstacleAnimToggle === 0 ? 1 : 0;
            if (frameCount % 30 === 0 && !player.isCrashing) score += 5;

            if (player.isCrashing) {
                player.crashTimer--;
                if (player.crashTimer <= 0) {
                    player.isCrashing = false;
                    if (lives <= 0) { showGameOverScreen(false); return; }
                }
            }

            if (!player.isCrashing) scrollY += worldSpeed;

            if (scrollY >= canvas.height) {
                scrollY = 0; idxActual = idxSiguiente; idxSiguiente = (idxSiguiente + 1) % escaleras.length;
                if (idxSiguiente === 0) {
                    if (serieActual === 1) serieActual = 2;
                    else checkLevelProgression();
                }
            }

            const fondoActual = escaleras[idxActual];
            const fondoSiguiente = escaleras[idxSiguiente];
            if (fondoActual?.complete && fondoActual.naturalWidth > 0) {
                ctx.drawImage(fondoActual, 0, scrollY, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, scrollY, canvas.width, canvas.height);
            }
            if (fondoSiguiente?.complete && fondoSiguiente.naturalWidth > 0) {
                ctx.drawImage(fondoSiguiente, 0, scrollY - canvas.height, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, scrollY - canvas.height, canvas.width, canvas.height);
            }

            const lvlText = currentLevel > 10 ? `Nivel: ULTRA 🔥 | Pts: ${score}` : `Nivel: ${currentLevel}/10 🗼 | Pts: ${score}`;
            if (lvlText !== hudStatsLeftCache) { hudStatsLeftCache = lvlText; hudStatsLeftEl.innerText = lvlText; }
            const cocText = `☕ ${cocidosCount}/10`;
            if (cocText !== hudCocidosCache) { hudCocidosCache = cocText; hudCocidosEl.innerText = cocText; }
            const livText = `❤️ x${lives}`;
            if (livText !== hudLivesCache) { hudLivesCache = livText; hudLivesEl.innerText = livText; }

            for (let i = alerts.length - 1; i >= 0; i--) {
                let al = alerts[i]; if (!player.isCrashing) al.duration--;
                if (imgJePasse?.complete && imgJePasse.naturalWidth > 0) ctx.drawImage(imgJePasse, lanePositions[al.lane] - 36, al.y, 72, 48);
                if (al.duration <= 0) {
                    obstacles.push({ lane: al.lane, x: lanePositions[al.lane], targetX: lanePositions[al.lane], y: canvas.height + 60, type: 'corredor', variant: Math.floor(Math.random() * 3), width: SPRITE_SIZE, height: SPRITE_SIZE, speed: -worldSpeed * 1.25 });
                    alerts.splice(i, 1);
                }
            }

            spawnObstacles(); aplicarIAEsquive();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                if (!player.isCrashing) obs.y += obs.speed;
                obs.x += (obs.targetX - obs.x) * 0.1;

                let sprite = null;
                if (obs.type === 'cocido') sprite = obstacleAnimToggle === 0 ? tazaA : tazaB;
                else if (obs.type === 'maleta') {
                    sprite = obs.variant === 'azul' ? (obstacleAnimToggle === 0 ? maletaAzulA : maletaAzulB) : obs.variant === 'roja' ? (obstacleAnimToggle === 0 ? maletaRojaA : maletaRojaB) : (obstacleAnimToggle === 0 ? maletaLilaA : maletaLilaB);
                }
                else if (obs.type === 'anciano') sprite = obstacleAnimToggle === 0 ? ancianoBaja1 : ancianoBaja2;
                else if (obs.type === 'turista_pesada') sprite = obstacleAnimToggle === 0 ? turistaPesada1 : turistaPesada2;
                else if (obs.type === 'señora') sprite = obstacleAnimToggle === 0 ? señoraBajaA : señoraBajaB;
                else if (obs.type === 'anciana_bolsas') sprite = obstacleAnimToggle === 0 ? ancianaBolsasA : ancianaBolsasB;
                else if (obs.type === 'empresario') sprite = obstacleAnimToggle === 0 ? empresarioA : empresarioB;
                else if (obs.type === 'parada_foto') sprite = imgParadaFoto;
                else if (obs.type === 'turista_sentado') sprite = imgTuristaSentado;
                else if (obs.type === 'hincha_paraguay') sprite = imgHinchaParaguay;
                else if (obs.type === 'turista_sube') sprite = obstacleAnimToggle === 0 ? turistaSubeA : turistaSubeB;
                else if (obs.type === 'turista_sube_solo') sprite = obstacleAnimToggle === 0 ? turistaSubeSoloA : turistaSubeSoloB;
                else if (obs.type === 'corredor') sprite = obstacleAnimToggle === 0 ? corredoresCarga[obs.variant].c1 : corredoresCarga[obs.variant].c2;

                drawImageSafely(sprite, obs.x, obs.y, obs.width);

                if (!obs.hasCrashed && !player.isJumpingHandrail && !player.isCrashing && obs.lane === player.lane) {
                    if (Math.abs(obs.y - player.y) < 42) {
                        if (obs.type === 'cocido') {
                            score += 100; cocidosCount++;
                            if (cocidosCount >= 10) { cocidosCount = 0; lives++; }
                            obstacles.splice(i, 1); continue;
                        } else { triggerCrash(); obs.hasCrashed = true; continue; }
                    }
                }
                if (obs.y > canvas.height + 80 || obs.y < -80) obstacles.splice(i, 1);
            }

            if (player.isCrashing) {
                if (imgCrash?.complete) drawImageSafely(imgCrash, player.x, player.y, 60);
            } else if (player.isJumpingHandrail) {
                player.jumpProgress += 0.08;
                player.x = lanePositions[player.sourceLane] + (lanePositions[player.targetLane] - lanePositions[player.sourceLane]) * player.jumpProgress;
                let jH = Math.sin(player.jumpProgress * Math.PI) * 65;
                let jImg = player.facing === 'derecha' ? imgJumpD : imgJumpI;
                if (jImg?.complete) drawImageSafely(jImg, player.x, player.y - jH, 60);
                if (player.jumpProgress >= 1) { player.lane = player.targetLane; player.x = lanePositions[player.lane]; player.isJumpingHandrail = false; }
            } else {
                player.x += (lanePositions[player.lane] - player.x) * 0.3;
                let rImg = player.facing === 'derecha' ? (player.stepToggle === 0 ? imgRunD1 : imgRunD2) : (player.stepToggle === 0 ? imgRunI1 : imgRunI2);
                if (rImg?.complete) drawImageSafely(rImg, player.x, player.y, 60);
            }

            requestAnimationFrame(loop);
        }
    </script>
