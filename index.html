<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chipa Viajera: Montmartre Pro</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background-color: #000; display: flex; align-items: center; justify-content: center; font-family: 'Arial', sans-serif; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 420px; height: 100vh; background: #000; display: flex; flex-direction: column; }
        #ui-layer { display: flex; justify-content: space-between; align-items: center; padding: 12px; color: white; font-weight: bold; font-size: 13px; z-index: 10; background: rgba(0, 0, 0, 0.85); border-bottom: 1px solid #333; gap: 8px; }
        #hud-cocidos { white-space: nowrap; color: #f1c40f; }
        #hud-players { white-space: nowrap; color: #5dade2; }
        canvas { flex-grow: 1; width: 100%; background: #000; image-rendering: pixelated; }
        
        #level-banner { position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 32px; font-weight: bold; text-shadow: 3px 3px 0px #ff0055, -3px -3px 0px #00ffcc; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; text-align: center; width: 100%; letter-spacing: 2px; }
        #loading-screen { position: absolute; inset: 0; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Courier New', Courier, monospace; font-size: 18px; z-index: 40; letter-spacing: 2px; }

        .modal-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 88%; max-height: 85%; background: rgba(15, 15, 25, 0.98); border: 3px solid #ff0055; border-radius: 12px; padding: 22px 15px; text-align: center; color: #fff; z-index: 30; box-shadow: 0px 0px 25px rgba(255, 0, 85, 0.5); flex-direction: column; overflow-y: auto; }
        .go-title { font-family: 'Courier New', Courier, monospace; font-size: 20px; font-weight: bold; color: #ff0055; margin-bottom: 12px; }
        .score-highlight { color: #f1c40f; font-weight: bold; font-size: 20px; display: block; margin: 8px 0; }
        .go-input, .go-select { padding: 10px; width: 100%; margin-bottom: 12px; border-radius: 6px; border: 1px solid #555; background: #222; color: #fff; text-align: center; font-size: 15px; }
        .go-btn { display: block; width: 100%; padding: 11px; margin: 6px 0; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-whatsapp { background-color: #25D366; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-rank { background-color: #2980b9; color: #fff; }
        .btn-restart { background-color: #444; color: #fff; margin-top: 10px; }

        /* Estilo Ranking optimizado */
        #rankingList { list-style: none; padding: 0; margin: 15px 0; text-align: left; }
        #rankingList li { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; border-bottom: 1px solid #333; font-size: 14px; }
        .rank-row { display: flex; gap: 6px; align-items: center; overflow: hidden; }
        .rank-num { font-weight: bold; width: 20px; color: #fff; }
        .rank-flag { font-size: 16px; }
        .rank-name { color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
        .rank-pts { color: #f1c40f; font-weight: bold; flex-shrink: 0; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="hud-stats-left">Nivel: 1</div>
            <div id="hud-players">🌍</div>
            <div id="hud-cocidos">☕ 0</div>
            <div id="hud-lives">❤️ x3</div>
        </div>
        <div id="level-banner">NIVEL 1</div>
        <div id="loading-screen">CARGANDO...</div>

        <div id="game-over-screen" class="modal-screen">
            <div id="go-title" class="go-title">Game Over</div>
            <span class="score-highlight" id="final-score">0 Puntos</span>
            <input type="text" id="playerName" class="go-input" placeholder="Tu Nombre" maxlength="12">
            <select id="playerCountry" class="go-select">
                <option value="🇵🇾">Paraguay (🇵🇾)</option>
                <option value="🇫🇷">France (🇫🇷)</option>
                <option value="🇦🇷">Argentina (🇦🇷)</option>
                <option value="🇧🇷">Brasil (🇧🇷)</option>
                <option value="🇪🇸">España (🇪🇸)</option>
                <option value="🌍">Otro (🌍)</option>
            </select>
            <button id="btnSaveRank" class="go-btn btn-rank">📊 Guardar y Ver Ranking</button>
            <a id="btnShareWA" class="go-btn btn-whatsapp" href="#">📲 Compartir</a>
            <button id="btnRestartGame" class="go-btn btn-restart">Intentar de Nuevo</button>
        </div>

        <div id="ranking-modal" class="modal-screen" style="z-index: 35;">
            <div class="go-title" style="color:#00ffcc;">🏆 TOP 10</div>
            <ul id="rankingList"></ul>
            <button id="btnCloseRank" class="go-btn btn-restart">Volver</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = { apiKey: "AIzaSyARwzSFBfViQEo2mcVRvieMy2nuUiDYXqs", authDomain: "chipa-viajera.firebaseapp.com", projectId: "chipa-viajera", storageBucket: "chipa-viajera.firebasestorage.app", messagingSenderId: "533357296369", appId: "1:533357296369:web:97f7f9ad1c5b7664658750" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- CARGA DE ASSETS ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const SPRITE_SIZE = 105;
        let isPlaying = true;
        let score = 0;
        let lives = 3;
        let cocidosCount = 0;
        let currentLevel = 1;
        let worldSpeed = 4;
        let frameCount = 0;
        let obstacleAnimToggle = 0;

        // Arrays de imágenes
        const escaleras = [new Image(), new Image(), new Image(), new Image(), new Image(), new Image()];
        for(let i=0; i<6; i++) escaleras[i].src = `imagenes/Escalera París${i===0 ? '' : i}.png`;

        const imgRunD1 = new Image(); imgRunD1.src = 'imagenes/chipa_run_derecha1.png';
        const imgRunD2 = new Image(); imgRunD2.src = 'imagenes/chipa_run_derecha2.png';
        const imgJumpD = new Image(); imgJumpD.src = 'imagenes/chipa_jump_derecha.png';
        const imgRunI1 = new Image(); imgRunI1.src = 'imagenes/chipa_run_izquierda1.png';
        const imgRunI2 = new Image(); imgRunI2.src = 'imagenes/chipa_run_izquierda2.png';
        const imgJumpI = new Image(); imgJumpI.src = 'imagenes/chipa_jump_izquierda.png';
        const imgCrash = new Image(); imgCrash.src = 'imagenes/chipa_crash.png';

        // Corredores (Con nombre exacto)
        const corredoresCarga = [
            { c1: new Image(), c2: new Image() },
            { c1: new Image(), c2: new Image() },
            { c1: new Image(), c2: new Image() }
        ];
        corredoresCarga[0].c1.src = 'imagenes/Corredor_subu_Corre1.png';
        corredoresCarga[0].c2.src = 'imagenes/Corredor_subu_Corre2.png';
        corredoresCarga[1].c1.src = 'imagenes/Corredora_subé_Rojo1.png';
        corredoresCarga[1].c2.src = 'imagenes/Corredora_subé_Rojo2.png';
        corredoresCarga[2].c1.src = 'imagenes/Corredora_subu_Corre1.png';
        corredoresCarga[2].c2.src = 'imagenes/Corredora_subu_Corre2.png';

        const imgJePasse = new Image(); imgJePasse.src = 'imagenes/Je_passe.png';

        // ... (resto de lógica de juego se mantiene igual) ...

        // --- LÓGICA DE RANKING ---
        async function abrirPanelRanking() {
            const lista = document.getElementById("rankingList");
            lista.innerHTML = "<li>Cargando...</li>";
            document.getElementById("ranking-modal").style.display = "flex";
            try {
                const snapshot = await db.collection("ranking").orderBy("puntos", "desc").limit(10).get();
                lista.innerHTML = "";
                let i = 1;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    lista.innerHTML += `
                        <li>
                            <div class="rank-row">
                                <span class="rank-num">${i}.</span>
                                <span class="rank-flag">${data.bandera || '🌍'}</span>
                                <span class="rank-name">${data.nombre}</span>
                            </div>
                            <span class="rank-pts">${data.puntos} pts</span>
                        </li>`;
                    i++;
                });
            } catch(e) { lista.innerHTML = "<li>Error al cargar</li>"; }
        }

        document.getElementById("btnCloseRank").addEventListener("click", () => document.getElementById("ranking-modal").style.display = "none");
        document.getElementById("btnSaveRank").addEventListener("click", async () => {
            const nombre = document.getElementById("playerName").value.trim() || "Viajero";
            const pais = document.getElementById("playerCountry").value;
            await db.collection("ranking").add({ nombre, puntos: score, bandera: pais, fecha: new Date().toISOString() });
            document.getElementById("btnSaveRank").style.display = "none";
            abrirPanelRanking();
        });

        // --- INICIALIZACIÓN ---
        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.onload = () => {
            document.getElementById("loading-screen").style.display = "none";
        };

    </script>
</body>
</html>
