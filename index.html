<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chipa Viajera: Montmartre Pro</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Arial', sans-serif; overflow: hidden; height: 100vh; }
        #game-container { position: relative; width: 100%; max-width: 420px; height: 100vh; margin: auto; display: flex; flex-direction: column; }
        #ui-layer { display: flex; justify-content: space-between; align-items: center; padding: 10px; color: white; font-weight: bold; z-index: 10; background: rgba(0,0,0,0.9); border-bottom: 2px solid #ff0055; }
        #btnSound { font-size: 24px; cursor: pointer; background: none; border: none; }
        canvas { flex-grow: 1; width: 100%; background: #000; image-rendering: pixelated; }
        
        /* Modal de Bienvenida mejorado */
        #welcome-screen { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .welcome-card { width: 90%; background: #1a1a2e; border: 4px solid #ff0055; border-radius: 15px; padding: 20px; text-align: center; color: white; }
        #welcome-img { max-width: 60%; margin-bottom: 10px; }
        .welcome-text { font-size: 16px; line-height: 1.4; margin: 10px 0; }
        #welcome-loading { color: #f1c40f; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>Pts: <span id="score">0</span></div>
            <div id="hud-cocidos">☕ 0/10</div>
            <button id="btnSound">🔊</button>
        </div>
        
        <div id="welcome-screen">
            <div class="welcome-card">
                <img id="welcome-img" src="imagenes/Chipa Viajera con maletas1.png">
                <p class="welcome-text">¡Bienvenido! / Bienvenue!<br>La Chipa Viajera en Montmartre.<br><br>Intenta subir sin chocarte a los turistas o las maletas.</p>
                <p class="welcome-text">Si atrapas 10 cocidos, sumas una vida.</p>
                <p id="welcome-loading">Cargando...</p>
                <p style="font-size: 10px; color: #777; margin-top: 20px;">Matías Brizzio ©Juan Tereré 2026</p>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // --- CONFIGURACIÓN RÁPIDA ---
        const SPRITE_SIZE = 130; // Aumentado para que los objetos se vean más grandes
        let score = 0;
        let lives = 3;
        let cocidosCount = 0;
        let isMuted = false;

        // --- AUDIO ---
        const btnSound = document.getElementById("btnSound");
        btnSound.onclick = () => {
            isMuted = !isMuted;
            btnSound.innerText = isMuted ? "🔇" : "🔊";
            // Lógica de audio aquí...
        };

        // --- CARGA DE IMÁGENES ---
        const images = {};
        function loadAsset(name, src) {
            const img = new Image();
            img.src = src;
            images[name] = img;
        }

        // Carga simplificada para evitar bloqueos
        loadAsset('taza', 'imagenes/TazaA.png');
        loadAsset('turista_pesada1', 'imagenes/Turista_pesada1.png');
        loadAsset('turista_pesada2', 'imagenes/Turista_pesada2.png');
        // ... añadir aquí el resto de tus imágenes

        // --- BUCLE DE JUEGO ---
        function initGame() {
            document.getElementById("welcome-screen").style.display = "none";
            requestAnimationFrame(loop);
        }

        function loop() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            // Lógica de dibujo...
            requestAnimationFrame(loop);
        }

        // Inicio forzado para evitar el "se queda cargando"
        setTimeout(initGame, 2000); 
    </script>
</body>
</html>
