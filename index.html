<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chipa Viajera: Anti-Fantasmas y Hincha</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0; background-color: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Arial', sans-serif; height: 100vh; overflow: hidden;
        }
        #game-container {
            position: relative; width: 100%; max-width: 420px; height: 100vh;
            background: #000; display: flex; flex-direction: column;
        }
        #ui-layer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; color: white; font-weight: bold; font-size: 13px;
            z-index: 10; background: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid #333; gap: 8px;
        }
        #hud-cocidos { white-space: nowrap; color: #f1c40f; }
        canvas { flex-grow: 1; width: 100%; background: #000; image-rendering: pixelated; }
        
        #level-banner {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 32px;
            font-weight: bold; text-shadow: 3px 3px 0px #ff0055, -3px -3px 0px #00ffcc;
            z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.5s ease;
            text-align: center; width: 100%; letter-spacing: 2px;
        }

        #loading-screen {
            position: absolute; inset: 0; background: #000; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Courier New', Courier, monospace; font-size: 18px;
            z-index: 40; letter-spacing: 2px;
        }
        #game-over-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 85%;
            background: rgba(15, 15, 25, 0.95); border: 3px solid #ff0055;
            border-radius: 12px; padding: 25px 15px; text-align: center;
            color: #fff; z-index: 30; box-shadow: 0px 0px 20px rgba(255, 0, 85, 0.4);
        }
        #go-title {
            font-family: 'Courier New', Courier, monospace; font-size: 28px;
            font-weight: bold; color: #ff0055; margin-bottom: 5px;
            text-shadow: 2px 2px 0px #000;
        }
        #go-stats { font-size: 16px; margin-bottom: 20px; color: #ccc; line-height: 1.5; }
        .score-highlight { color: #f1c40f; font-weight: bold; font-size: 20px; display: block; margin-top: 5px; }
        
        #input-name-container { margin-bottom: 15px; }
        #playerName {
            width: 100%; padding: 10px; border: 2px solid #00ffcc; border-radius: 6px;
            background: #222; color: #fff; text-align: center; font-size: 14px; font-weight: bold;
        }

        .go-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border: none; border-radius: 6px; font-weight: bold; font-size: 14px;
            cursor: pointer; text-decoration: none; text-align: center;
        }
        .btn-whatsapp { background-color: #25D366; color: #fff; }
        .btn-cert { background-color: #00ffcc; color: #000; }
        .btn-restart { background-color: #333; color: #fff; border: 1px solid #555; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="hud-stats-left">Nivel: 1/10 🗼 | Puntos: 0</div>
            <div id="hud-cocidos">☕ 0/10</div>
            <div id="hud-lives">❤️ x3</div>
        </div>
        <div id="level-banner">NIVEL 1</div>
        <div id="loading-screen">CARGANDO... 🥮</div>

        <div id="game-over-screen">
            <div id="go-title">FIN DEL VIAJE</div>
            <div id="go-stats">
                Llegaste al Nivel <span id="final-level">1</span>
                <span class="score-highlight" id="final-score">Puntos: 0</span>
            </div>
            
            <div id="input-name-container">
                <input type="text" id="playerName" placeholder="Escribe tu nombre para el diploma" maxlength="20">
            </div>

            <a id="btnShareWA" class="go-btn btn-whatsapp" href="#" target="_blank">📲 Compartir en WhatsApp</a>
            <button id="btnDownloadCert" class="go-btn btn-cert">🏆 Descargar Certificado</button>
            <button id="btnRestartGame" class="go-btn btn-restart">Intentar de Nuevo</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Configuración obtenida de tus capturas
        const firebaseConfig = {
            apiKey: "AIzaSyARwzSFBfViQEo2mcVRvieMy2nuUiDYXqs",
            authDomain: "chipa-viajera.firebaseapp.com",
            projectId: "chipa-viajera",
            storageBucket: "chipa-viajera.appspot.com",
            messagingSenderId: "5333729636",
            appId: "1:5333729636:web:97f7f9ad1c5b7664658750"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Función global para actualizar tus estadísticas en Cloud Firestore
        window.registrarJugadorEnBaseDeDatos = async () => {
            try {
                const estadisticasRef = doc(db, "metadatos", "estadisticas");
                await updateDoc(estadisticasRef, {
                    totalJugadores: increment(1)
                });
                console.log("Métrica guardada exitosamente en Firestore.");
            } catch (error) {
                console.error("Error guardando datos en Firebase:", error);
            }
        };
    </script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });

        let isPlaying = true; 
        let frameCount = 0;
        let lives = 3;
        let score = 0; 
        let cocidosCount = 0;
        
        let currentLevel = 1;
        let worldSpeed = 4; 
        let spawnRate = 75; 
        
        let serieActual = 1; 
        let idxActual = 0;   
        let idxSiguiente = 1;

        let scrollY = 0; 
        let lanePositions = []; 

        const SPRITE_SIZE = 105; 

        // --- CARGA DE ASSETS CORREGIDOS CON 'imagenes/' ---
        const escaleras = [new Image(), new Image(), new Image(), new Image(), new Image(), new Image()];
        escaleras[0].src = 'imagenes/Escalera París.png';
        escaleras[1].src = 'imagenes/Escalera París1.png';
        escaleras[2].src = 'imagenes/Escalera París2.png';
        escaleras[3].src = 'imagenes/Escalera París3.png';
        escaleras[4].src = 'imagenes/Escalera París4.png';
        escaleras[5].src = 'imagenes/Escalera París5.png';

        const imgRunD1 = new Image(); imgRunD1.src = 'imagenes/chipa_run_derecha1.png';
        const imgRunD2 = new Image(); imgRunD2.src = 'imagenes/chipa_run_derecha2.png';
        const imgJumpD = new Image(); imgJumpD.src = 'imagenes/chipa_jump_derecha.png';
        const imgRunI1 = new Image(); imgRunI1.src = 'imagenes/chipa_run_izquierda1.png';
        const imgRunI2 = new Image(); imgRunI2.src = 'imagenes/chipa_run_izquierda2.png';
        const imgJumpI = new Image(); imgJumpI.src = 'imagenes/chipa_jump_izquierda.png'; 
        const imgCrash = new Image(); imgCrash.src = 'imagenes/chipa_crash.png'; 

        const maletaAzulA = new Image(); maletaAzulA.src = 'imagenes/Maleta azulA.png';
        const maletaAzulB = new Image(); maletaAzulB.src = 'imagenes/Maleta azulB.png';
        const maletaRojaA = new Image(); maletaRojaA.src = 'imagenes/Maleta rojaA.png';
        const maletaRojaB = new Image(); maletaRojaB.src = 'imagenes/Maleta rojaB.png';
        const maletaLilaA = new Image(); maletaLilaA.src = 'imagenes/Maleta lilaA.png';
        const maletaLilaB = new Image(); maletaLilaB.src = 'imagenes/Maleta lilaB.png';

        const ancianoBaja1 = new Image(); ancianoBaja1.src = 'imagenes/Ancianos bajando1.png';
        const ancianoBaja2 = new Image(); ancianoBaja2.src = 'imagenes/Ancianos bajando2.png';
        const turistaPesada1 = new Image(); turistaPesada1.src = 'imagenes/Turista_pesada1.png';
        const turistaPesada2 = new Image(); turistaPesada2.src = 'imagenes/Turista_pesada2.png';
        const señoraBajaA = new Image(); señoraBajaA.src = 'imagenes/Señora_bajandoA.png';
        const señoraBajaB = new Image(); señoraBajaB.src = 'imagenes/Señora_bajandoB.png';
        const imgParadaFoto = new Image(); imgParadaFoto.src = 'imagenes/Parada_foto.png';
        const imgTuristaSentado = new Image(); imgTuristaSentado.src = 'imagenes/Turista sentado.png';
        const imgHinchaParaguay = new Image(); imgHinchaParaguay.src = 'imagenes/hincha de Paraguay.png';
        const ancianaBolsasA = new Image(); ancianaBolsasA.src = 'imagenes/Anciana_bolsasA.png';
        const ancianaBolsasB = new Image(); ancianaBolsasB.src = 'imagenes/Anciana_bolsasB.png';
        const empresarioA = new Image(); empresarioA.src = 'imagenes/EmpresarioA.png';
        const empresarioB = new Image(); empresarioB.src = 'imagenes/EmpresarioB.png';
        const turistaSubeA = new Image(); turistaSubeA.src = 'imagenes/Subiendo TuristaA.png';
        const turistaSubeB = new Image(); turistaSubeB.src = 'imagenes/Subiendo TuristaB.png';
        const turistaSubeSoloA = new Image(); turistaSubeSoloA.src = 'imagenes/Turista sube soloA.png'; 
        const turistaSubeSoloB = new Image(); turistaSubeSoloB.src = 'imagenes/Turista sube soloB.png';
        const tazaA = new Image(); tazaA.src = 'imagenes/TazaA.png';
        const tazaB = new Image(); tazaB.src = 'imagenes/TazaB.png';

        const corredoresCarga = [
            { c1: new Image(), c2: new Image() }, { c1: new Image(), c2: new Image() }, { c1: new Image(), c2: new Image() }
        ];
        corredoresCarga[0].c1.src = 'imagenes/Corredor_sube_Corre1.png'; corredoresCarga[0].c2.src = 'imagenes/Corredor_sube_Corre2.png';
        corredoresCarga[1].c1.src = 'imagenes/Corredora_sube_Rojo1.png'; corredoresCarga[1].c2.src = 'imagenes/Corredora_sube_Rojo2.png';
        corredoresCarga[2].c1.src = 'imagenes/Corredora_sube_Corre1.png'; corredoresCarga[2].c2.src = 'imagenes/Corredora_sube_Corre2.png';
        const imgJePasse = new Image(); imgJePasse.src = 'imagenes/Je_passe.png';

        const player = {
            lane: 1, x: 0, y: 0, isJumpingHandrail: false, jumpProgress: 0,
            sourceLane: 1, targetLane: 3, stepToggle: 0, facing: 'derecha',
            isCrashing: false, crashTimer: 0
        };

        const obstacles = []; const alerts = []; let obstacleAnimToggle = 0;

        const hudStatsLeftEl = document.getElementById("hud-stats-left");
        const hudCocidosEl = document.getElementById("hud-cocidos");
        const hudLivesEl = document.getElementById("hud-lives");
        let hudStatsLeftCache = ""; let hudCocidosCache = ""; let hudLivesCache = "";

        function resizeCanvas() {
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
            player.y = canvas.height - 130;
            let w = canvas.width;
            lanePositions = [w * 0.22, w * 0.38, w * 0.50, w * 0.62, w * 0.78];
            player.x = lanePositions[player.lane];
        }
        
        window.addEventListener('load', () => { 
            resizeCanvas(); 
            precargarAssets().then(() => {
                const loadingScreen = document.getElementById("loading-screen");
                if (loadingScreen) loadingScreen.style.display = "none";
                showLevelBanner();
                loop();
            });
        });
        window.addEventListener('resize', resizeCanvas);

        function precargarAssets() {
            const todasLasImagenes = [
                ...escaleras, imgRunD1, imgRunD2, imgJumpD, imgRunI1, imgRunI2, imgCrash,
                maletaAzulA, maletaAzulB, maletaRojaA, maletaRojaB, maletaLilaA, maletaLilaB,
                ancianoBaja1, ancianoBaja2, turistaPesada1, turistaPesada2, señoraBajaA, señoraBajaB, 
                imgParadaFoto, imgTuristaSentado, imgHinchaParaguay, ancianaBolsasA, ancianaBolsasB, 
                empresarioA, empresarioB, turistaSubeA, turistaSubeB, turistaSubeSoloA, turistaSubeSoloB,
                tazaA, tazaB, imgJePasse, ...corredoresCarga.flatMap(c => [c.c1, c.c2])
            ];
            const promesas = todasLasImagenes.map(img => new Promise(resolve => {
                const terminar = () => { if (img.decode) img.decode().then(resolve).catch(resolve); else resolve(); };
                if (img.complete && img.naturalWidth > 0) terminar();
                else { img.addEventListener('load', terminar, { once: true }); img.addEventListener('error', resolve, { once: true }); }
            }));
            return Promise.race([Promise.all(promesas), new Promise(r => setTimeout(r, 4000))]);
        }

        function showLevelBanner() {
            const banner = document.getElementById("level-banner");
            banner.innerText = `NIVEL ${currentLevel}`; banner.style.opacity = "1";
            setTimeout(() => { banner.style.opacity = "0"; }, 1800);
        }

        function showGameOverScreen(won = false) {
            isPlaying = false;
            const screen = document.getElementById("game-over-screen");
            const title = document.getElementById("go-title");
            const btnWA = document.getElementById("btnShareWA");

            document.getElementById("final-level").innerText = currentLevel;
            document.getElementById("final-score").innerText = `Puntos: ${score}`;

            if (won) { title.innerText = "¡VICTORIA TOTAL! 🏆"; title.style.color = "#00ffcc"; } 
            else { title.innerText = "FIN DEL VIAJE 🗼"; title.style.color = "#ff0055"; }

            const textShare = encodeURIComponent(`¡Conseguí ${score} puntos en Montmartre con la Chipa Viajera! 🥮☕ ¿Podés superarme?`);
            btnWA.href = `https://api.whatsapp.com/send?text=${textShare}`;
            screen.style.display = "block";

            // Disparador de base de datos integrado
            if(window.registrarJugadorEnBaseDeDatos) {
                window.registrarJugadorEnBaseDeDatos();
            }
        }

        // --- SISTEMA DE DESCARGA DE CERTIFICADO SEGURO ---
        document.getElementById("btnDownloadCert").addEventListener("click", () => {
            const nombreCert = document.getElementById("playerName").value.trim() || "Viajero";
            const btn = document.getElementById("btnDownloadCert");
            btn.innerText = "Generando... ⏳";

            const certImg = new Image();
            certImg.crossOrigin = "anonymous"; 
            certImg.src = "imagenes/Certificado de puntos_Montmartre.jpg"; 

            function generarCertificadoNativo(ctxCanvas, width, height) {
                const gradiente = ctxCanvas.createLinearGradient(0, 0, width, height);
                gradiente.addColorStop(0, '#1a1a2e'); gradiente.addColorStop(1, '#16213e');
                ctxCanvas.fillStyle = gradiente; ctxCanvas.fillRect(0, 0, width, height);
                ctxCanvas.strokeStyle = '#f1c40f'; ctxCanvas.lineWidth = 20; ctxCanvas.strokeRect(10, 10, width - 20, height - 20);
                ctxCanvas.fillStyle = '#f1c40f'; ctxCanvas.font = `bold ${width * 0.05}px sans-serif`; ctxCanvas.textAlign = "center";
                ctxCanvas.fillText("CERTIFICADO DE EXPERTO", width * 0.5, height * 0.3);
                ctxCanvas.fillStyle = '#ffffff'; ctxCanvas.font = `${width * 0.035}px sans-serif`;
                ctxCanvas.fillText("Otorgado con orgullo a:", width * 0.5, height * 0.45);
            }

            function procesarLienzo() {
                try {
                    const c = document.createElement("canvas");
                    c.width = certImg.naturalWidth || 1200; c.height = certImg.naturalHeight || 800;
                    const cx = c.getContext("2d");

                    if (certImg.complete && certImg.naturalWidth > 0) {
                        cx.drawImage(certImg, 0, 0);
                        cx.fillStyle = "#111111"; cx.font = `bold ${c.width * 0.042}px sans-serif`; cx.textAlign = "center";
                        cx.fillText(nombreCert.toUpperCase(), c.width * 0.5, c.height * 0.58);
                        cx.fillStyle = "#d35400"; cx.font = `bold ${c.width * 0.05}px sans-serif`;
                        cx.fillText(`${score} PUNTOS`, c.width * 0.5, c.height * 0.68);
                    } else {
                        generarCertificadoNativo(cx, c.width, c.height);
                        cx.fillStyle = "#f1c40f"; cx.font = `bold ${c.width * 0.05}px sans-serif`; cx.textAlign = "center";
                        cx.fillText(nombreCert.toUpperCase(), c.width * 0.5, c.height * 0.58);
                        cx.fillStyle = "#ffffff"; cx.font = `bold ${c.width * 0.045}px sans-serif`;
                        cx.fillText(`${score} PUNTOS EN MONTMARTRE`, c.width * 0.5, c.height * 0.70);
                    }

                    const link = document.createElement("a");
                    link.href = c.toDataURL("image/jpeg", 0.95);
                    link.download = `Certificado_Montmartre_${nombreCert.replace(/\s+/g, '_')}.jpg`;
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                    btn.innerText = "🏆 Descargar Certificado";
                } catch (error) {
                    console.error("Error certificado:", error);
                    btn.innerText = "❌ Error al descargar";
                }
            }
            certImg.onload = procesarLienzo;
            certImg.onerror = procesarLienzo;
        });

        document.getElementById("btnRestartGame").addEventListener("click", () => window.location.reload());

        function handleInput(direction) {
            if (!isPlaying || player.isJumpingHandrail || player.isCrashing) return;
            if (direction === 'left') {
                player.facing = 'izquierda';
                if (player.lane === 3) { player.isJumpingHandrail = true; player.sourceLane = 3; player.targetLane = 1; player.jumpProgress = 0; } 
                else if (player.lane === 1) player.lane = 0; else if (player.lane === 4) player.lane = 3;
            } else if (direction === 'right') {
                player.facing = 'derecha';
                if (player.lane === 1) { player.isJumpingHandrail = true; player.sourceLane = 1; player.targetLane = 3; player.jumpProgress = 0; } 
                else if (player.lane === 0) player.lane = 1; else if (player.lane === 3) player.lane = 4;
            }
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") handleInput('left');
            if (e.key === "ArrowRight") handleInput('right');
        });

        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            if (touchX < canvas.width / 2) handleInput('left'); else handleInput('right');
        }, { passive: false });

        function triggerCrash() { player.isCrashing = true; player.crashTimer = 60; lives--; }

        function checkLevelProgression() {
            if (currentLevel >= 10) { showGameOverScreen(true); return; }
            currentLevel++; worldSpeed += 0.8; spawnRate = Math.max(35, spawnRate - 6);
            serieActual = 1; score += 500; showLevelBanner();
        }

        function spawnObstacles() {
            if (player.isCrashing) return;
            if (frameCount % spawnRate === 0) {
                const validLanes = [0, 1, 3, 4];
                const selectedLane = validLanes[Math.floor(Math.random() * validLanes.length)];
                const rand = Math.random();

                if (rand < 0.08) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'cocido', width: SPRITE_SIZE * 0.65, height: SPRITE_SIZE * 0.65, speed: worldSpeed }); } 
                else if (rand < 0.20) {
                    let color = 'azul'; if (Math.random() > 0.66) color = 'roja'; else if (Math.random() > 0.33) color = 'lila';
                    obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'maleta', variant: color, width: SPRITE_SIZE * 0.75, height: SPRITE_SIZE * 0.75, speed: worldSpeed * 1.1 });
                } 
                else if (rand < 0.29) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'anciano', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.12 }); } 
                else if (rand < 0.38) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_pesada', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.4 }); } 
                else if (rand < 0.47) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'señora', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.1 }); } 
                else if (rand < 0.56) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'anciana_bolsas', width: SPRITE_SIZE * 0.85, height: SPRITE_SIZE * 0.85, speed: worldSpeed * 0.35 }); } 
                else if (rand < 0.64) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'empresario', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 1.15 }); } 
                else if (rand < 0.70) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'parada_foto', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed }); } 
                else if (rand < 0.76) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sentado', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed }); } 
                else if (rand < 0.82) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'hincha_paraguay', width: SPRITE_SIZE * 0.8, height: SPRITE_SIZE * 0.8, speed: worldSpeed }); } 
                else if (rand < 0.88) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sube', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.65 }); } 
                else if (rand < 0.94) { obstacles.push({ lane: selectedLane, x: lanePositions[selectedLane], targetX: lanePositions[selectedLane], y: -60, type: 'turista_sube_solo', width: SPRITE_SIZE, height: SPRITE_SIZE, speed: worldSpeed * 0.85 }); } 
                else { if (!alerts.some(a => a.lane === selectedLane)) alerts.push({ lane: selectedLane, x: lanePositions[selectedLane], y: canvas.height - 80, duration: 85 }); }
            }
        }

        function aplicarIAEsquive() {
            for (let i = 0; i < obstacles.length; i++) {
                let obsA = obstacles[i]; if (obsA.type === 'parada_foto' || obsA.type === 'turista_sentado' || obsA.type === 'cocido' || obsA.type === 'hincha_paraguay') continue; 
                for (let j = 0; j < obstacles.length; j++) {
                    if (i === j) continue; let obsB = obstacles[j];
                    if (obsA.lane === obsB.lane && Math.abs(obsA.y - obsB.y) < 115) {
                        let desvíos = []; if (obsA.lane === 0) desvíos = [1]; if (obsA.lane === 1) desvíos = [0]; if (obsA.lane === 3) desvíos = [4]; if (obsA.lane === 4) desvíos = [3];
                        let mejorCarril = obsA.lane;
                        for (let lan of desvíos) { if (!obstacles.some(o => o.lane === lan && Math.abs(o.y - obsA.y) < 120)) { mejorCarril = lan; break; } }
                        if (mejorCarril !== obsA.lane) { obsA.lane = mejorCarril; obsA.targetX = lanePositions[mejorCarril]; }
                    }
                }
            }
        }

        function drawImageSafely(img, x, y, baseWidth) {
            if (img && img.complete && img.naturalWidth > 0) {
                let aspect = img.naturalWidth / img.naturalHeight; let renderHeight = baseWidth / aspect; 
                ctx.drawImage(img, x - (baseWidth / 2), y - (renderHeight / 2), baseWidth, renderHeight);
            } else { ctx.fillStyle = "rgba(255, 0, 128, 0.4)"; ctx.fillRect(x - (baseWidth / 2), y - (baseWidth / 2), baseWidth, baseWidth); }
        }

        function loop() {
            if (!isPlaying) return; ctx.clearRect(0, 0, canvas.width, canvas.height); frameCount++;
            if (frameCount % 8 === 0) player.stepToggle = player.stepToggle === 0 ? 1 : 0;
            if (frameCount % 14 === 0) obstacleAnimToggle = obstacleAnimToggle === 0 ? 1 : 0;
            if (frameCount % 30 === 0 && !player.isCrashing) score += 5;

            if (player.isCrashing) { player.crashTimer--; if (player.crashTimer <= 0) { player.isCrashing = false; if (lives <= 0) { showGameOverScreen(false); return; } } }
            if (!player.isCrashing) scrollY += worldSpeed;

            if (scrollY >= canvas.height) {
                scrollY = 0; idxActual = idxSiguiente; idxSiguiente = (idxSiguiente + 1) % escaleras.length;
                if (idxSiguiente === 0) { if (serieActual === 1) serieActual = 2; else checkLevelProgression(); }
            }

            if (escaleras[idxActual] && escaleras[idxActual].complete) ctx.drawImage(escaleras[idxActual], 0, scrollY, canvas.width, canvas.height);
            if (escaleras[idxSiguiente] && escaleras[idxSiguiente].complete) ctx.drawImage(escaleras[idxSiguiente], 0, scrollY - canvas.height, canvas.width, canvas.height);

            const sL = `Nivel: ${currentLevel}/10 🗼 | Puntos: ${score}`; if (sL !== hudStatsLeftCache) { hudStatsLeftCache = sL; hudStatsLeftEl.innerText = sL; }
            const cT = `☕ ${cocidosCount}/10`; if (cT !== hudCocidosCache) { hudCocidosCache = cT; hudCocidosEl.innerText = cT; }
            const lT = `❤️ x${lives}`; if (lT !== hudLivesCache) { hudLivesCache = lT; hudLivesEl.innerText = lT; }

            for (let i = alerts.length - 1; i >= 0; i--) {
                let al = alerts[i]; if (!player.isCrashing) al.duration--;
                if (imgJePasse && imgJePasse.complete) ctx.drawImage(imgJePasse, lanePositions[al.lane] - 36, al.y, 72, 48);
                if (al.duration <= 0) {
                    obstacles.push({ lane: al.lane, x: lanePositions[al.lane], targetX: lanePositions[al.lane], y: canvas.height + 60, type: 'corredor', variant: Math.floor(Math.random() * 3), width: SPRITE_SIZE, height: SPRITE_SIZE, speed: -worldSpeed * 1.25 });
                    alerts.splice(i, 1);
                }
            }

            spawnObstacles(); aplicarIAEsquive();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i]; if (!player.isCrashing) obs.y += obs.speed; obs.x += (obs.targetX - obs.x) * 0.1; 
                let spriteRender = null;
                if (obs.type === 'cocido') spriteRender = obstacleAnimToggle === 0 ? tazaA : tazaB;
                else if (obs.type === 'maleta') {
                    if (obs.variant === 'azul') spriteRender = obstacleAnimToggle === 0 ? maletaAzulA : maletaAzulB;
                    else if (obs.variant === 'roja') spriteRender = obstacleAnimToggle === 0 ? maletaRojaA : maletaRojaB;
                    else spriteRender = obstacleAnimToggle === 0 ? maletaLilaA : maletaLilaB;
                } 
                else if (obs.type === 'anciano') spriteRender = obstacleAnimToggle === 0 ? ancianoBaja1 : ancianoBaja2;
                else if (obs.type === 'turista_pesada') spriteRender = obstacleAnimToggle === 0 ? turistaPesada1 : turistaPesada2;
                else if (obs.type === 'señora') spriteRender = obstacleAnimToggle === 0 ? señoraBajaA : señoraBajaB;
                else if (obs.type === 'anciana_bolsas') spriteRender = obstacleAnimToggle === 0 ? ancianaBolsasA : ancianaBolsasB;
                else if (obs.type === 'empresario') spriteRender = obstacleAnimToggle === 0 ? empresarioA : empresarioB;
                else if (obs.type === 'parada_foto') spriteRender = imgParadaFoto;
                else if (obs.type === 'turista_sentado') spriteRender = imgTuristaSentado;
                else if (obs.type === 'hincha_paraguay') spriteRender = imgHinchaParaguay; 
                else if (obs.type === 'turista_sube') spriteRender = obstacleAnimToggle === 0 ? turistaSubeA : turistaSubeB;
                else if (obs.type === 'turista_sube_solo') spriteRender = obstacleAnimToggle === 0 ? turistaSubeSoloA : turistaSubeSoloB;
                else if (obs.type === 'corredor') spriteRender = obstacleAnimToggle === 0 ? corredoresCarga[obs.variant].c1 : corredoresCarga[obs.variant].c2;

                drawImageSafely(spriteRender, obs.x, obs.y, obs.width);

                if (!obs.hasCrashed && !player.isJumpingHandrail && !player.isCrashing && obs.lane === player.lane) {
                    if (Math.abs(obs.y - player.y) < 42) {
                        if (obs.type === 'cocido') { score += 100; cocidosCount++; if (cocidosCount >= 10) { cocidosCount = 0; lives++; } obstacles.splice(i, 1); continue; } 
                        else { triggerCrash(); obs.hasCrashed = true; continue; }
                    }
                }
                if (obs.y > canvas.height + 80 || obs.y < -80) obstacles.splice(i, 1);
            }

            let targetX = lanePositions[player.lane];
            if (player.isCrashing) { if (imgCrash && imgCrash.complete) ctx.drawImage(imgCrash, player.x - 24, player.y - 24, 48, 48); } 
            else if (player.isJumpingHandrail) {
                player.jumpProgress += 0.08;
                let startX = lanePositions[player.sourceLane]; let endX = lanePositions[player.targetLane];
                player.x = startX + (endX - startX) * player.jumpProgress;
                let jumpHeight = Math.sin(player.jumpProgress * Math.PI) * 65;
                let activeJumpImg = player.facing === 'derecha' ? imgJumpD : imgJumpI;
                if (activeJumpImg && activeJumpImg.complete) ctx.drawImage(activeJumpImg, player.x - 24, player.y - jumpHeight - 24, 48, 48);
                if (player.jumpProgress >= 1) { player.lane = player.targetLane; player.x = lanePositions[player.lane]; player.isJumpingHandrail = false; }
            } else {
                player.x += (targetX - player.x) * 0.3;
                let activeImg = player.facing === 'derecha' ? (player.stepToggle === 0 ? imgRunD1 : imgRunD2) : (player.stepToggle === 0 ? imgRunI1 : imgRunI2);
                if (activeImg && activeImg.complete) ctx.drawImage(activeImg, player.x - 24, player.y - 24, 48, 48);
            }
            requestAnimationFrame(loop);
        }
    </script>
